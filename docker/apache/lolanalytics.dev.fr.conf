<VirtualHost *:80>
    ServerName lolanalytics.dev.fr
    ServerAlias www.lolanalytics.dev.fr
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted

        FallbackResource /index.php
    </Directory>

    <IfModule mod_rewrite.c>
        RewriteEngine On

        # Allow the toolbar to function even when accessed over IP or server name
        RewriteCond %{REMOTE_ADDR} !^127\.0\.0\.1$
        RewriteCond %{REMOTE_ADDR} !^::1$
        RewriteCond %{HTTP_HOST} !^lolanalytics.dev.fr$
        RewriteRule ^(.*)$ /app_dev.php [QSA,L]

        # Redirect non-existing files/directories to the front controller
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^(.*)$ /app_dev.php [QSA,L]
    </IfModule>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
