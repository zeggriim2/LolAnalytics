<IfModule mod_ssl.c>
	<VirtualHost _default_:443>
		ServerName lolanalytics.dev.fr
		DocumentRoot /var/www/html/public

		# SSL Configuration
		SSLEngine on
		SSLCertificateFile /etc/ssl/certs/cert.pem
		SSLCertificateKeyFile /etc/ssl/certs/key.pem

		# Other directives...
	</VirtualHost>
</IfModule>